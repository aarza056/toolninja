<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="18" fill="#0d0020"/>
  <!-- Two crossing rhombus blades = 4-pointed shuriken -->
  <polygon points="50,4 61,50 50,96 39,50" fill="url(#g)"/>
  <polygon points="4,50 50,39 96,50 50,61" fill="url(#g)"/>
  <!-- Center circle for depth -->
  <circle cx="50" cy="50" r="9" fill="#0d0020" opacity="0.75"/>
</svg>

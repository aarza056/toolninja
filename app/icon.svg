<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background: dark rounded square with subtle purple tint -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Shuriken: 4-pointed ninja star, rotated 22.5° for the classic angled look -->
  <!-- Outer tips at r=13, inner concave points at r=5.5 -->
  <polygon
    points="16,3 19.9,10.5 29,16 19.9,21.5 16,29 12.1,21.5 3,16 12.1,10.5"
    fill="url(#blade)"
    transform="rotate(22.5 16 16)"
  />

  <!-- Small dark center circle for depth -->
  <circle cx="16" cy="16" r="3" fill="#0a0a0a" opacity="0.6"/>
</svg>
